name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  proofs:
    runs-on: ubuntu-latest   # has Docker — so full-stack + the container isolation tier run for real
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run all proofs
        run: node test-all.mjs
